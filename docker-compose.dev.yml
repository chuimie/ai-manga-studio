version: "3.9"

services:
  # ── API 开发模式（源码热重载 + 直接端口暴露） ──
  manga-studio:
    # 挂载源码，修改后容器内自动生效，无需 rebuild
    volumes:
      - ./backend:/app/backend
      - ./assets:/app/assets
      - ./models/lora:/app/models/lora
      - ./exports:/app/exports
      - ./logs:/app/logs
      - ./qc_reports:/app/qc_reports
    ports:
      - "8000:8000"
    # 启用 --reload，修改 .py 文件后自动重启
    command: >
      uvicorn main_app:app --host 0.0.0.0 --port 8000 --reload

  # ── 前端开发模式（源码挂载，修改即时生效） ──
  frontend:
    volumes:
      # 改为读写模式，允许开发时修改
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"